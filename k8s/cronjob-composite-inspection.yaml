apiVersion: batch/v1
kind: CronJob
metadata:
  name: codex-composite-inspection
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: codex-inspector
              image: your-registry/codex-ops-inspector:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: codex-openai-compatible
                      key: OPENAI_API_KEY
              envFrom:
                - configMapRef:
                    name: codex-inspector-runtime-composite
              volumeMounts:
                - name: runtime-config
                  mountPath: /workspace/config/runtime.env
                  subPath: runtime.env
                  readOnly: true
                - name: kubeconfig
                  mountPath: /run/secrets/kubeconfig
                  subPath: kubeconfig
                  readOnly: true
                - name: output
                  mountPath: /workspace/output
          volumes:
            - name: runtime-config
              configMap:
                name: codex-inspector-runtime-composite-file
            - name: kubeconfig
              secret:
                secretName: codex-kubeconfig
            - name: output
              emptyDir: {}

