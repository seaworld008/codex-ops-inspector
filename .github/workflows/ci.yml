name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 校验 Shell 脚本语法
        run: find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: 校验 Node 脚本语法
        run: node --check scripts/generate-docx-report.mjs

      - name: 校验 Dockerfile 可构建
        run: docker build -t codex-ops-inspector:ci .

